<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة الريلز القرآنية | Quran Reels Generator</title>
    <meta name="description" content="أداة احترافية لإنشاء فيديوهات قرآنية قصيرة (ريلز) بشكل آلي تماماً">
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="particles" id="particles"></div>

    <header class="header">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
        </div>
        <h1 class="logo-title">الريلز القرآنية (صدقة جارية)</h1>
        <p class="logo-subtitle">Quran Reels Generator Pro</p>
    </header>

    <main class="main-container">
        <div class="content-grid">
            <div class="glass-card">
                <h2 class="card-title">✨ إعداد الفيديو</h2>
                <form id="generatorForm" class="form-grid">
                    <div class="form-group full-width">
                        <label class="form-label">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                            </svg>
                            اسمك (اختياري)
                        </label>
                        <div class="input-wrapper">
                            <input type="text" id="personName" class="form-control" placeholder="اكتب اسمك هنا"
                                maxlength="50">
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M9.93 13.5h4.14L12 7.98zM20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-4.05 16.5l-1.14-3H9.17l-1.12 3H5.96l5.11-13h1.86l5.11 13h-2.09z" />
                            </svg>
                            اختر الخط من القائمة
                        </label>
                        <div class="input-wrapper">
                            <select id="fontSelect" class="form-control">
                                <option value="random">عشوائي (تلقائي)</option>
                            </select>
                        </div>
                    </div>



                    <div class="form-group full-width">
                        <label class="form-label">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M9.93 13.5h4.14L12 7.98zM20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-4.05 16.5l-1.14-3H9.17l-1.12 3H5.96l5.11-13h1.86l5.11 13h-2.09z" />
                            </svg>
                            اختر القارئ
                        </label>
                        <div class="input-wrapper">
                            <select id="reciterSelect" class="form-control">
                                <option value="">جاري تحميل القراء...</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-4.05 16.5l-1.14-3H9.17l-1.12 3H5.96l5.11-13h1.86l5.11 13h-2.09z" />
                            </svg>
                            السورة الكريمة
                        </label>
                        <div class="input-wrapper">
                            <input type="text" id="surahSearch" class="form-control" placeholder="ابحث عن السورة...">
                            <select id="surahSelect" class="form-control"></select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">آية البداية</label>
                        <div class="counter-control">
                            <button type="button" class="counter-btn" data-type="minus"
                                data-target="startAyah">−</button>
                            <input type="number" id="startAyah" class="counter-input" value="1" min="1" max="286">
                            <button type="button" class="counter-btn" data-type="plus"
                                data-target="startAyah">+</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">آية النهاية</label>
                        <div class="counter-control">
                            <button type="button" class="counter-btn" data-type="minus" data-target="endAyah">−</button>
                            <input type="number" id="endAyah" class="counter-input" value="7" min="1" max="286">
                            <button type="button" class="counter-btn" data-type="plus" data-target="endAyah">+</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">جودة الفيديو</label>
                        <select id="qualitySelect" class="form-control">
                            <option value="low">منخفضة (سريع)</option>
                            <option value="medium" selected>مـتوسطة</option>
                            <option value="high">عــالية (بطيء)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">القالب البصري</label>
                        <select id="templateSelect" class="form-control">
                            <option value="normal" selected>افتراضي (طبيعة)</option>
                            <option value="ramadan">رمضاني (ذهبي)</option>
                            <option value="masjid">مساجد وصلاة</option>
                            <option value="islamic">فنون إسلامية</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">
                            <svg viewBox="0 0 24 24">
                                <path d="M4 9h16v2H4zm0 4h10v2H4z" />
                            </svg>
                            إظهار الآيات على الفيديو؟
                        </label>
                        <select id="showTextSelect" class="form-control">
                            <option value="yes" selected>نعم، أظهر الآيات</option>
                            <option value="no">لا، بدون نص (فيديو وصوت فقط)</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label checkbox-label" for="bismillahCheckbox">
                            <input type="checkbox" id="bismillahCheckbox" checked />
                            <span>بدء الفيديو بالبسملة (بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ)</span>
                        </label>
                        <p class="form-hint">يتم تلقائياً تخطي سورتي الفاتحة والتوبة</p>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="targetDurationInput">
                            الحد الأقصى لمدة الفيديو (ثوانٍ)
                        </label>
                        <input type="number" id="targetDurationInput" class="form-control"
                               min="0" step="1" placeholder="بدون حد" />
                        <p class="form-hint">اتركه فارغاً لاستخدام كل الآيات المحددة</p>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reciterSpeedInput">
                            سرعة التلاوة (<span id="reciterSpeedValue">1.00</span>×)
                        </label>
                        <input type="range" id="reciterSpeedInput" class="form-control"
                               min="0.5" max="2.0" step="0.05" value="1.0" />
                        <p class="form-hint">0.5× أبطأ، 1.0× عادي، 2.0× أسرع (بدون تغيير النبرة)</p>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="transitionStyleSelect">أسلوب الانتقال بين الآيات</label>
                        <select id="transitionStyleSelect" class="form-control">
                            <option value="" selected>افتراضي (حسب القالب)</option>
                            <option value="cinematic">سينمائي — قطع حاد (بدون تداخل)</option>
                            <option value="dynamic">متحرك — تداخل (xfade) بين كل آية</option>
                            <option value="smooth">سلس — تداخل خفيف بين بعض الآيات فقط</option>
                            <option value="cut">قطع فقط — لا تداخل ولا تلاشي</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">تنسيق الفيديو</label>
                        <select id="formatSelect" class="form-control">
                            <option value="reels" selected>Instagram Reels / TikTok (9:16)</option>
                            <option value="story">Instagram Story (9:16)</option>
                            <option value="post">Square Post (1:1)</option>
                        </select>
                    </div>
                    <div class="btn-group full-width">
                        <button type="button" id="refreshFontsBtn" class="premium-btn btn-secondary">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"
                                    fill="currentColor" />
                            </svg>
                            تحديث الخطوط
                        </button>
                        <button type="button" id="previewBtn" class="premium-btn btn-secondary">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
                                    fill="currentColor" />
                            </svg>
                            معاينة
                        </button>
                        <button type="submit" id="generateBtn" class="premium-btn btn-primary">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"
                                    fill="currentColor" />
                            </svg>
                            إنشاء الفيديو
                        </button>
                    </div>
                </form>
            </div>

            <div id="statusCard" class="glass-card status-card">
                <div class="progress-header">
                    <div class="progress-info">
                        <h4 id="statusText">جاري التحضير...</h4>
                    </div>
                    <div class="progress-percentage" id="progressPercent">0%</div>
                </div>
                <div class="progress-track">
                    <div id="progressFill" class="progress-bar"></div>
                </div>
                <div class="log-terminal" id="logTerminal">
                    <div class="log-line">> <span>بانتظار بدء المهمة...</span></div>
                </div>
                <div id="videoPreviewWrapper" class="video-preview-wrapper">
                    <video id="previewVideo" controls poster="vision/nature/nature_part1.mp4">
                        <p>متصفحك لا يدعم تشغيل الفيديو.</p>
                    </video>
                    <div class="download-wrapper">
                        <a id="downloadLink" href="#" class="premium-btn btn-primary download-link" download>تحميل الفيديو</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>

</html>
